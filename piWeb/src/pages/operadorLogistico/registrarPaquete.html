<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar Paquete - Operador Logístico</title>
  <link rel="stylesheet" href="/piWeb/styles/operadorComun.css">
  <link rel="stylesheet" href="/piWeb/styles/registrarPaquete.css">
</head>
<body>
  <div class="tablero-operador">
    <aside class="barra-lateral barra-lateral--izquierda">
      <div class="barra-lateral__marca-bloque">
        <div class="encabezado__logo">
          <img src="/piWeb/images/logoSinFondo.png" alt="Metzvia" />
        </div>
        <h2 class="barra-lateral__marca">METZVIA</h2>
      </div>

      <nav class="barra-lateral__menu">
        <a href="/piWeb/src/pages/operadorLogistico/dashboardOperador.html" class="barra-lateral__item">Dashboard</a>
        <a href="/piWeb/src/pages/operadorLogistico/enviosOperador.html" class="barra-lateral__item">Envíos</a>
        <a href="/piWeb/src/pages/operadorLogistico/registrarPaquete.html" class="barra-lateral__item barra-lateral__item--activo">Registrar Paquete</a>
        <a href="/piWeb/src/pages/operadorLogistico/enviosOperador.html" class="barra-lateral__item">Escaneo</a>
        <a href="/piWeb/src/pages/operadorLogistico/enviosOperador.html" class="barra-lateral__item">Retracciones</a>
        <a href="/piWeb/src/pages/operadorLogistico/enviosOperador.html" class="barra-lateral__item">Incidencias</a>
        <a href="/piWeb/src/pages/operadorLogistico/enviosOperador.html" class="barra-lateral__item">Mi Cuenta</a>
      </nav>

      <div class="barra-lateral__pie">
        <a href="/piWeb/login.html" class="barra-lateral__item barra-lateral__item--salir">↪ Salir</a>
      </div>
    </aside>

    <main class="panel-principal">
      <header class="barra-superior">
        <h1 class="barra-superior__titulo">Registrar paquete</h1>
        <div class="barra-superior__perfil">
          <img src="/piWeb/images/usuario.png" alt="Operador" class="barra-superior__avatar" />
          <span class="barra-superior__estado"></span>
        </div>
      </header>

      <section class="modulo-registro">
        <div class="registro-encabezado">
          <span class="registro-encabezado__icono">▣</span>
          <h2>Registrar Paquete</h2>
        </div>

        <article class="tarjeta-formulario">
          <h3>Nuevo Envío</h3>

          <div class="pasos-formulario" role="tablist" aria-label="Pasos de registro">
            <button type="button" class="paso-chip paso-chip--activo" data-step-target="remitente">Datos del Remitente</button>
            <button type="button" class="paso-chip" data-step-target="destinatario">Datos del Destinatario</button>
          </div>

          <div class="seccion-formulario paso-formulario paso-formulario--activo" data-step="remitente">
            <p class="seccion-formulario__titulo">Datos del Remitente</p>

            <div class="grupo-campos grupo-campos--dos">
              <label>
                Nombre Completo / Razón Social
                <input type="text" placeholder="Ingresar nombre..." />
              </label>
              <label>
                Teléfono
                <input type="tel" placeholder="Ingresar teléfono..." />
              </label>
            </div>

            <div class="grupo-campos grupo-campos--uno">
              <label>
                Correo Electrónico (opcional)
                <input type="email" placeholder="Ingresar correo..." />
              </label>
            </div>

            <div class="grupo-campos grupo-campos--dos">
              <label>
                Calle y número
                <input type="text" placeholder="Ingresar dirección..." />
              </label>
              <label>
                Colonia
                <input type="text" placeholder="Ingresar colonia..." />
              </label>
            </div>

            <div class="grupo-campos grupo-campos--tres">
              <label>
                Ciudad
                <input type="text" value="Ciudad de México" />
              </label>
              <label>
                Estado
                <select>
                  <option>Seleccionar estado...</option>
                  <option>CDMX</option>
                  <option>Jalisco</option>
                  <option>Nuevo León</option>
                </select>
              </label>
              <label>
                Código postal
                <input type="text" placeholder="Ingresar código postal..." />
              </label>
            </div>
          </div>

          <div class="seccion-formulario paso-formulario" data-step="destinatario">
            <p class="seccion-formulario__titulo">Datos del Destinatario</p>

            <div class="grupo-campos grupo-campos--dos">
              <label>
                Nombre Completo / Razón Social
                <input type="text" placeholder="Ingresar nombre..." />
              </label>
              <label>
                Teléfono
                <input type="tel" placeholder="Ingresar teléfono..." />
              </label>
            </div>

            <div class="grupo-campos grupo-campos--uno">
              <label>
                Correo Electrónico (opcional)
                <input type="email" placeholder="Ingresar correo..." />
              </label>
            </div>

            <div class="grupo-campos grupo-campos--dos">
              <label>
                Calle y número
                <input type="text" placeholder="Ingresar dirección..." />
              </label>
              <label>
                Colonia
                <input type="text" placeholder="Ingresar colonia..." />
              </label>
            </div>

            <div class="grupo-campos grupo-campos--tres">
              <label>
                Ciudad
                <input type="text" value="Ciudad de México" />
              </label>
              <label>
                Estado
                <select>
                  <option>Seleccionar estado...</option>
                  <option>CDMX</option>
                  <option>Jalisco</option>
                  <option>Nuevo León</option>
                </select>
              </label>
              <label>
                Código postal
                <input type="text" placeholder="Ingresar código postal..." />
              </label>
            </div>
          </div>
        </article>

        <div class="acciones-formulario">
          <a href="/piWeb/src/pages/operadorLogistico/dashboardOperador.html" class="boton-secundario">Cancelar</a>
          <button type="button" class="boton-primario" id="boton-siguiente" aria-label="Siguiente paso">→</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const pasos = ['remitente', 'destinatario'];
    let pasoActivo = 0;

    const paneles = document.querySelectorAll('.paso-formulario');
    const chips = document.querySelectorAll('.paso-chip');
    const botonSiguiente = document.getElementById('boton-siguiente');

    function mostrarPaso(indice) {
      pasoActivo = indice;

      paneles.forEach(panel => {
        panel.classList.toggle('paso-formulario--activo', panel.dataset.step === pasos[pasoActivo]);
      });

      chips.forEach(chip => {
        chip.classList.toggle('paso-chip--activo', chip.dataset.stepTarget === pasos[pasoActivo]);
      });

      botonSiguiente.textContent = pasoActivo === 0 ? '→' : '✓';
      botonSiguiente.setAttribute('aria-label', pasoActivo === 0 ? 'Ir a destinatario' : 'Finalizar registro');
    }

    chips.forEach((chip, indice) => {
      chip.addEventListener('click', () => {
        mostrarPaso(indice);
      });
    });

    botonSiguiente.addEventListener('click', () => {
      if (pasoActivo === 0) {
        mostrarPaso(1);
        return;
      }

      window.location.href = '/piWeb/src/pages/operadorLogistico/enviosOperador.html';
    });
  </script>
</body>
</html>
