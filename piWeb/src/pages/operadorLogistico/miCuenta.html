<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Cuenta - Operador Logístico</title>
  <link rel="stylesheet" href="/piWeb/styles/operadorComun.css">
  <link rel="stylesheet" href="/piWeb/styles/miCuenta.css">
</head>
<body>
  <div class="tablero-operador">
    <aside class="barra-lateral barra-lateral--izquierda">
      <div class="barra-lateral__marca-bloque">
        <div class="encabezado__logo">
          <img src="/piWeb/images/logoSinFondo.png" alt="Metzvia" />
        </div>
        <h2 class="barra-lateral__marca">METZVIA</h2>
      </div>

      <nav class="barra-lateral__menu">
        <a href="/piWeb/src/pages/operadorLogistico/dashboardOperador.html" class="barra-lateral__item">Dashboard</a>
        <a href="/piWeb/src/pages/operadorLogistico/enviosOperador.html" class="barra-lateral__item">Envíos</a>
        <a href="/piWeb/src/pages/operadorLogistico/registrarPaquete.html" class="barra-lateral__item">Registrar Paquete</a>
        <a href="/piWeb/src/pages/operadorLogistico/enviosOperador.html" class="barra-lateral__item">Escaneo</a>
        <a href="/piWeb/src/pages/operadorLogistico/enviosOperador.html" class="barra-lateral__item">Retracciones</a>
        <a href="/piWeb/src/pages/operadorLogistico/incidencias.html" class="barra-lateral__item">Incidencias</a>
        <a href="/piWeb/src/pages/operadorLogistico/miCuenta.html" class="barra-lateral__item barra-lateral__item--activo">Mi Cuenta</a>
      </nav>

      <div class="barra-lateral__pie">
        <a href="/piWeb/login.html" class="barra-lateral__item barra-lateral__item--salir">↪ Salir</a>
      </div>
    </aside>

    <main class="panel-principal">
      <header class="barra-superior">
        <h1 class="barra-superior__titulo">Mi cuenta</h1>
        <div class="barra-superior__perfil">
          <img src="/piWeb/images/usuario.png" alt="Operador" class="barra-superior__avatar" />
          <span class="barra-superior__estado"></span>
        </div>
      </header>

      <section class="modulo-cuenta">
        <div class="cuenta-fondo-superior"></div>

        <div class="cuenta-perfil-principal">
          <img src="/piWeb/images/usuario.png" alt="Foto de perfil" class="cuenta-perfil-principal__avatar" />
          <h2>Juan Pérez</h2>
          <p class="cuenta-perfil-principal__estado">
            <span class="cuenta-perfil-principal__punto"></span>
            Operador Logístico
          </p>
        </div>

        <div class="cuenta-datos">
          <div class="cuenta-datos__fila">
            <span class="cuenta-datos__etiqueta">Trabajo:</span>
            <span class="cuenta-datos__valor">Operador Logístico</span>
          </div>
          <div class="cuenta-datos__fila">
            <span class="cuenta-datos__etiqueta">Email:</span>
            <span class="cuenta-datos__valor">juanperes@email.com</span>
          </div>
          <div class="cuenta-datos__fila">
            <span class="cuenta-datos__etiqueta">Teléfono:</span>
            <span class="cuenta-datos__valor">+52 55 1234 5678</span>
          </div>
          <div class="cuenta-datos__fila cuenta-datos__fila--select">
            <label for="centro-distribucion" class="cuenta-datos__etiqueta">Centro de Distribución:</label>
            <select id="centro-distribucion" class="cuenta-datos__selector">
              <option selected>🇲🇽 CDMX-CD01</option>
              <option>🇲🇽 GDL-CD02</option>
              <option>🇲🇽 MTY-CD03</option>
            </select>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
