<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datos del Paquete - Operador Logístico</title>
  <link rel="stylesheet" href="/piWeb/styles/operadorComun.css">
  <link rel="stylesheet" href="/piWeb/styles/registrarPaquete.css">
</head>
<body>
  <div class="tablero-operador tablero-operador--sin-sidebar">

    <div id="menuContainer" class="menu-overlay"></div>
    <div id="menuBackdrop" class="menu-overlay__backdrop"></div>

    <main class="panel-principal panel-principal--full">
      <header class="barra-superior barra-superior--con-logo">
        <div class="barra-superior__left">
          <button id="btnMenu" class="btn-menu-hamburguesa" aria-label="Abrir menú">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="header-logo">
            <img src="/piWeb/images/logoSinFondo.png" alt="Metzvia" />
          </div>
          <h1 class="barra-superior__titulo">Registrar paquete</h1>
        </div>
        <div class="barra-superior__perfil">
          <img src="/piWeb/images/usuario.png" alt="Operador" class="barra-superior__avatar" />
          <span class="barra-superior__chevron">▾</span>
        </div>
      </header>

      <section class="modulo-registro">
        <div class="registro-encabezado">
          <span class="registro-encabezado__icono">▣</span>
          <h2>Registrar Paquete</h2>
        </div>

        <article class="tarjeta-formulario">
          <section class="bloque-registro">
            <h3 class="bloque-registro__titulo">Datos del Paquete</h3>

            <div class="grupo-campos grupo-campos--cuatro">
              <label>
                Peso (kg)
                <input type="number" value="1" />
              </label>
              <label>
                Largo (cm)
                <input type="number" value="20" />
              </label>
              <label>
                Ancho (cm)
                <input type="number" value="15" />
              </label>
              <label>
                Alto (cm)
                <input type="number" value="10" />
              </label>
            </div>

            <div class="grupo-campos grupo-campos--dos">
              <label>
                Valor Declarado
                <input type="text" placeholder="Ingrese monto..." />
              </label>
              <label>
                Guía (opcional)
                <input type="text" placeholder="Ingresar observaciones..." />
              </label>
            </div>

            <div class="checks-linea">
              <label class="check-item"><input type="checkbox" /> ¿Es frágil?</label>
              <label class="check-item"><input type="checkbox" /> ¿Requiere seguro?</label>
            </div>
          </section>

          <section class="bloque-registro bloque-registro--secundario">
            <h3 class="bloque-registro__titulo">Información Logística</h3>

            <div class="subbloque">
              <p class="campo-titulo">Tipo de Servicio</p>
              <div class="opciones-linea">
                <label class="radio-item"><input type="radio" name="servicio" checked /> Normal</label>
                <label class="radio-item"><input type="radio" name="servicio" /> Exprés</label>
                <label class="radio-item"><input type="radio" name="servicio" /> Mismo día</label>
              </div>
            </div>

            <div class="subbloque grupo-campos grupo-campos--dos">
              <label>
                Fecha programada de envío
                <input type="date" value="2026-03-05" />
              </label>
              <label>
                Repartidor asignado
                <select>
                  <option>Seleccionar repartidor...</option>
                  <option>Javier Torres</option>
                  <option>Juan Morales</option>
                  <option>Miguel López</option>
                </select>
              </label>
            </div>

            <div class="subbloque grupo-campos grupo-campos--dos">
              <label>
                Ruta asignada
                <select>
                  <option>Seleccionar ruta...</option>
                  <option>CDMX-015</option>
                  <option>CDMX-030</option>
                  <option>QRO-018</option>
                </select>
              </label>
              <label>
                Centro de distribución origen
                <select>
                  <option>CDMX-CD01</option>
                  <option>CDMX-CD02</option>
                </select>
              </label>
            </div>
          </section>
        </article>

        <div class="acciones-formulario">
          <a href="/piWeb/src/pages/operadorLogistico/registrarPaquete.html" class="boton-secundario">Cancelar</a>
          <button type="button" class="boton-primario boton-primario--texto" id="boton-guardar">Guardar</button>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-exito modal-exito--oculto" id="modal-exito" role="dialog" aria-modal="true" aria-labelledby="titulo-exito">
    <div class="modal-exito__tarjeta">
      <div class="modal-exito__check">✓</div>
      <h2 id="titulo-exito">¡Paquete Registrado!</h2>
      <p>El paquete se ha registrado exitosamente con el número de guía <strong id="guia-generada">PAK00000000</strong>.</p>
      <div class="modal-exito__acciones">
        <button type="button" class="boton-primario boton-primario--texto" id="boton-aceptar">Aceptar</button>
      </div>
    </div>
  </div>

  <script src="/piWeb/src/pages/operadorLogistico/menuOperador.js"></script>
  <script>
    const botonGuardar = document.getElementById('boton-guardar');
    const modalExito = document.getElementById('modal-exito');
    const botonAceptar = document.getElementById('boton-aceptar');
    const guiaGenerada = document.getElementById('guia-generada');

    function construirGuia() {
      const numero = Math.floor(10000000 + Math.random() * 90000000);
      return `PAK${numero}`;
    }

    botonGuardar.addEventListener('click', () => {
      const guia = construirGuia();
      guiaGenerada.textContent = guia;
      modalExito.classList.remove('modal-exito--oculto');
    });

    botonAceptar.addEventListener('click', () => {
      const guia = guiaGenerada.textContent;
      window.location.href = `/piWeb/src/pages/operadorLogistico/enviosOperador.html?registro=ok&guia=${encodeURIComponent(guia)}`;
    });
  </script>
</body>
</html>
